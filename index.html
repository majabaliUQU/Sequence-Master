<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الذاكرة الجماعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f9ff;
            user-select: none;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 3D Card Effects */
        .perspective-1000 { perspective: 1000px; }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        /* Card Colors */
        .card-front {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            z-index: 2;
        }
        .card-back {
            background-color: white;
            color: #1e3a8a;
            transform: rotateY(180deg);
            font-size: 1.8rem; /* Adjusted for mobile */
            font-weight: 900;
            border: 3px solid #3b82f6;
            z-index: 1;
        }

        /* Animations */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .fade-enter { animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .confetti {
            position: fixed; width: 10px; height: 10px; background-color: #f00;
            animation: fall linear forwards; z-index: 100;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

        /* Utility for Hard Mode List */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center bg-blue-50">

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="w-full max-w-md p-6 bg-white rounded-3xl shadow-xl z-10 fade-enter mx-4">
        <h1 class="text-3xl font-black text-center text-blue-900 mb-6">تحدي الذاكرة 🧠</h1>
        
        <!-- Difficulty Selection -->
        <div class="mb-6">
            <label class="block text-gray-700 font-bold mb-2">مستوى الصعوبة:</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setDifficulty('easy')" id="btn-easy" class="difficulty-btn p-2 rounded-xl border-2 border-green-500 text-green-600 font-bold hover:bg-green-50 transition text-sm md:text-base">سهل</button>
                <button onclick="setDifficulty('medium')" id="btn-medium" class="difficulty-btn p-2 rounded-xl border-2 border-blue-500 bg-blue-500 text-white font-bold transition text-sm md:text-base">متوسط</button>
                <button onclick="setDifficulty('hard')" id="btn-hard" class="difficulty-btn p-2 rounded-xl border-2 border-red-500 text-red-600 font-bold hover:bg-red-50 transition text-sm md:text-base">صعب</button>
            </div>
            <p id="diff-desc" class="text-xs text-gray-500 mt-2 text-center h-4">الخطأ يعيد اللعبة من الصفر (الأرقام 1-9)</p>
        </div>

        <!-- Player Count -->
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">عدد اللاعبين:</label>
            <div class="flex justify-center gap-3">
                <button onclick="updatePlayerCount(1)" class="player-count-btn w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-blue-200 font-bold text-lg hover:bg-blue-100 transition">1</button>
                <button onclick="updatePlayerCount(2)" class="player-count-btn w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-blue-200 font-bold text-lg hover:bg-blue-100 transition">2</button>
                <button onclick="updatePlayerCount(3)" class="player-count-btn w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-blue-200 font-bold text-lg hover:bg-blue-100 transition">3</button>
                <button onclick="updatePlayerCount(4)" class="player-count-btn w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-blue-200 font-bold text-lg hover:bg-blue-100 transition">4</button>
            </div>
        </div>

        <!-- Player Names Input -->
        <div id="player-inputs" class="space-y-2 mb-6 max-h-40 overflow-y-auto">
            <!-- Dynamic Inputs -->
        </div>

        <button onclick="startGame()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition transform active:scale-95 text-xl">
            ابدأ اللعب! 🚀
        </button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="hidden flex-col items-center w-full h-full p-4 max-w-lg justify-center">
        
        <!-- Header Info -->
        <div class="w-full flex justify-between items-center mb-4 flex-none">
            <button onclick="exitGame()" class="text-sm font-bold text-gray-500 hover:text-red-500 transition px-3 py-1 rounded hover:bg-red-50 flex items-center gap-1">
                <span>✕</span> خروج
            </button>
            <div class="bg-blue-100 px-4 py-1 rounded-full text-blue-800 font-bold text-xs md:text-sm" id="level-badge">متوسط</div>
        </div>

        <!-- Turn Indicator -->
        <div class="text-center mb-4 flex-none h-16 flex flex-col justify-center">
            <p class="text-gray-500 text-xs mb-1">الدور على:</p>
            <h2 id="current-player-name" class="text-3xl md:text-4xl font-black text-blue-900 animate-pulse truncate px-4">اللاعب 1</h2>
        </div>

        <!-- Game Grid -->
        <div class="relative w-full aspect-square max-w-[340px] flex-none">
            <div id="game-grid" class="grid grid-cols-3 grid-rows-3 gap-2 md:gap-3 w-full h-full">
                <!-- Cards -->
            </div>
            <!-- Error Flash -->
            <div id="error-overlay" class="absolute inset-0 bg-red-500/20 rounded-xl opacity-0 pointer-events-none transition-opacity duration-300 z-50"></div>
        </div>

        <!-- Hard Mode Hint (Numbers List) -->
        <div id="hard-mode-hint" class="hidden w-full mt-4 flex-none">
            <p class="text-center text-gray-500 text-xs mb-2">الأرقام الموجودة (ابحث عنها بالترتيب):</p>
            <div id="numbers-list" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide justify-start md:justify-center px-2">
                <!-- Numbers populated by JS -->
            </div>
        </div>

    </div>

    <!-- WIN MODAL -->
    <div id="win-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-[60] hidden backdrop-blur-sm px-4">
        <div class="bg-white rounded-3xl p-6 md:p-8 text-center w-full max-w-sm shadow-2xl border-4 border-yellow-400 fade-enter relative">
            <div class="text-6xl md:text-7xl mb-4">🏆</div>
            <h2 class="text-2xl md:text-3xl font-black text-blue-900 mb-2">أحسنت!</h2>
            <p class="text-lg text-gray-600 mb-1">الفائز هو</p>
            <p id="winner-name" class="text-2xl md:text-3xl font-bold text-blue-600 mb-6 truncate">...</p>
            
            <div class="flex flex-col gap-3">
                <button onclick="restartGame()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl transition shadow-lg text-lg">
                    لعب مرة أخرى 🔄
                </button>
                <button onclick="exitGame()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 px-6 rounded-xl transition">
                    القائمة الرئيسية
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- State ---
        let config = {
            difficulty: 'medium',
            playerCount: 1, // Default 1
            playerNames: []
        };
        
        let gameState = {
            currentPlayerIndex: 0,
            targetIndex: 0,
            sequence: [],
            isProcessing: false
        };

        // --- Setup Logic ---
        const diffDesc = {
            easy: "خطأ؟ تغلق ورقة واحدة. يكمل التالي.",
            medium: "خطأ؟ تغلق كل الأوراق (1-9).",
            hard: "صعب! أرقام عشوائية (1-100) وتغلق كلها."
        };

        function setDifficulty(level) {
            config.difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('bg-green-500', 'bg-blue-500', 'bg-red-500', 'text-white');
                if(btn.id.includes('easy')) btn.classList.add('text-green-600');
                if(btn.id.includes('medium')) btn.classList.add('text-blue-600');
                if(btn.id.includes('hard')) btn.classList.add('text-red-600');
            });

            const activeBtn = document.getElementById(`btn-${level}`);
            activeBtn.classList.remove('text-green-600', 'text-blue-600', 'text-red-600');
            activeBtn.classList.add('text-white');
            if(level === 'easy') activeBtn.classList.add('bg-green-500');
            if(level === 'medium') activeBtn.classList.add('bg-blue-500');
            if(level === 'hard') activeBtn.classList.add('bg-red-500');

            document.getElementById('diff-desc').textContent = diffDesc[level];
        }

        function updatePlayerCount(count) {
            config.playerCount = count;
            
            // Highlight selected button
            document.querySelectorAll('.player-count-btn').forEach(btn => {
                if(parseInt(btn.textContent) === count) {
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.remove('hover:bg-blue-100', 'border-blue-200');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.add('hover:bg-blue-100', 'border-blue-200');
                }
            });

            renderPlayerInputs();
        }

        function renderPlayerInputs() {
            const container = document.getElementById('player-inputs');
            container.innerHTML = '';
            for (let i = 1; i <= config.playerCount; i++) {
                container.innerHTML += `
                    <input type="text" id="p${i}-name" value="اللاعب ${i}"
                    onfocus="if(this.value==='اللاعب ${i}') this.value=''" 
                    onblur="if(this.value==='') this.value='اللاعب ${i}'"
                    class="w-full p-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:outline-none text-right bg-gray-50 transition-all focus:bg-white focus:shadow-md text-sm md:text-base">
                `;
            }
        }

        function generateSequence() {
            if (config.difficulty === 'hard') {
                const set = new Set();
                while(set.size < 9) set.add(Math.floor(Math.random() * 100) + 1);
                gameState.sequence = Array.from(set).sort((a, b) => a - b);
            } else {
                gameState.sequence = [1, 2, 3, 4, 5, 6, 7, 8, 9];
            }
        }

        function updateHintUI() {
            const hintDiv = document.getElementById('hard-mode-hint');
            const listDiv = document.getElementById('numbers-list');
            if(config.difficulty === 'hard') {
                hintDiv.classList.remove('hidden');
                listDiv.innerHTML = gameState.sequence.map(n => 
                    `<span class="bg-white border border-gray-200 px-2 py-1 rounded text-sm font-bold text-gray-600 whitespace-nowrap shadow-sm">${n}</span>`
                ).join('');
            } else {
                hintDiv.classList.add('hidden');
            }
        }

        // --- Game Controls ---
        function startGame() {
            // Read names from inputs
            config.playerNames = [];
            for (let i = 1; i <= config.playerCount; i++) {
                const name = document.getElementById(`p${i}-name`).value.trim() || `اللاعب ${i}`;
                config.playerNames.push(name);
            }

            setupGameEnvironment();
        }

        function restartGame() {
            document.getElementById('win-modal').classList.add('hidden');
            setupGameEnvironment();
        }

        function exitGame() {
            document.getElementById('win-modal').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        function setupGameEnvironment() {
            // Reset State
            gameState.currentPlayerIndex = 0;
            gameState.targetIndex = 0;
            gameState.isProcessing = false;

            // Logic
            generateSequence();

            // UI
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('flex');
            document.getElementById('level-badge').textContent = 
                config.difficulty === 'easy' ? 'سهل' : (config.difficulty === 'medium' ? 'متوسط' : 'صعب');

            updateHintUI();
            renderGrid();
            updateTurnDisplay();
        }

        function updateTurnDisplay() {
            const nameEl = document.getElementById('current-player-name');
            nameEl.textContent = config.playerNames[gameState.currentPlayerIndex];
            
            // Visual feedback for turn
            const colors = ['text-blue-900', 'text-purple-900', 'text-green-900', 'text-orange-900'];
            // Remove old colors
            nameEl.className = `text-3xl md:text-4xl font-black animate-pulse truncate px-4 transition-colors duration-300 ${colors[gameState.currentPlayerIndex % 4]}`;
        }

        function nextTurn() {
            gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % config.playerCount;
            updateTurnDisplay();
        }

        function renderGrid() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            
            let boardValues = [...gameState.sequence].sort(() => Math.random() - 0.5);

            boardValues.forEach((val, idx) => {
                const card = document.createElement('div');
                card.className = 'perspective-1000 relative';
                card.innerHTML = `
                    <div class="card-inner" id="card-${idx}" onclick="handleCardClick(this, ${val})">
                        <div class="card-face card-front">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white/50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        </div>
                        <div class="card-face card-back">${val}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function handleCardClick(cardElement, value) {
            if (gameState.isProcessing || cardElement.classList.contains('flipped')) return;

            cardElement.classList.add('flipped');

            const expectedValue = gameState.sequence[gameState.targetIndex];

            if (value === expectedValue) {
                // Correct
                gameState.targetIndex++;
                
                if (gameState.targetIndex >= gameState.sequence.length) {
                    setTimeout(() => showWinModal(), 500);
                }
                // Keep turn if correct

            } else {
                // Wrong
                gameState.isProcessing = true;
                
                const overlay = document.getElementById('error-overlay');
                cardElement.parentElement.classList.add('shake');
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');

                // 1. Wait while showing number
                setTimeout(() => {
                    // 2. Hide Red Flash
                    overlay.classList.remove('opacity-100');
                    overlay.classList.add('opacity-0');
                    cardElement.parentElement.classList.remove('shake');

                    if (config.difficulty === 'easy') {
                        // Easy: Close only wrong card
                        cardElement.classList.remove('flipped');
                    } else {
                        // Med/Hard: Close all
                        document.querySelectorAll('.card-inner').forEach(c => c.classList.remove('flipped'));
                        gameState.targetIndex = 0; 
                    }

                    nextTurn();
                    gameState.isProcessing = false;

                }, 1000); // 1 second viewing time
            }
        }

        function showWinModal() {
            const winner = config.playerNames[gameState.currentPlayerIndex];
            document.getElementById('winner-name').textContent = winner;
            document.getElementById('win-modal').classList.remove('hidden');
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#f43f5e', '#10b981', '#3b82f6', '#f59e0b'];
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = -10 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        // Initialize defaults
        updatePlayerCount(1);
        setDifficulty('medium');

    </script>
</body>
</html>
